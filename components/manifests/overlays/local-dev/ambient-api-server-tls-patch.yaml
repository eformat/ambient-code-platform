# Local-dev (OpenShift): enable end-to-end TLS using service-ca provisioned certs.
# Uses local JWKS file (not remote URL) for JWT validation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-api-server
spec:
  template:
    spec:
      containers:
        - name: api-server
          command:
            - /usr/local/bin/ambient-api-server
            - serve
            - --db-host-file=/secrets/db/db.host
            - --db-port-file=/secrets/db/db.port
            - --db-user-file=/secrets/db/db.user
            - --db-password-file=/secrets/db/db.password
            - --db-name-file=/secrets/db/db.name
            - --enable-jwt=true
            # Authz disabled: api-server has no internal RBAC middleware yet.
            # Auth is handled by the backend proxy. TODO: enable when authz is implemented.
            - --enable-authz=false
            - --jwk-cert-file=/configs/authentication/jwks.json
            - --enable-https=true
            - --https-cert-file=/etc/tls/tls.crt
            - --https-key-file=/etc/tls/tls.key
            - --enable-tls=true
            - --tls-cert-file=/etc/tls/tls.crt
            - --tls-key-file=/etc/tls/tls.key
            - --tls-auto-detect-kubernetes=false
            - --api-server-bindaddress=:8000
            - --metrics-server-bindaddress=:4433
            - --health-check-server-bindaddress=:4434
            - --enable-health-check-https=true
            # SSL disabled: PostgreSQL is in-cluster (same namespace, pod network only).
            # Switch to --db-sslmode=require if using an external database.
            - --db-sslmode=disable
            - --db-max-open-connections=50
            - --enable-db-debug=false
            - --enable-metrics-https=false
            - --http-read-timeout=5s
            - --http-write-timeout=30s
            - --cors-allowed-origins=*
            - --cors-allowed-headers=X-Ambient-Project
            - --enable-grpc=true
            - --grpc-server-bindaddress=:9000
            - --grpc-enable-tls=true
            - --grpc-tls-cert-file=/etc/tls/tls.crt
            - --grpc-tls-key-file=/etc/tls/tls.key
            - --alsologtostderr
            - -v=4
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/ambient
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 4434
              scheme: HTTPS
              httpHeaders:
                - name: User-Agent
                  value: Probe
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: tls-certs
          secret:
            # Auto-provisioned by OpenShift service-ca via the Service annotation
            # service.beta.openshift.io/serving-cert-secret-name: ambient-api-server-tls
            secretName: ambient-api-server-tls
